name: CI — Test, Coverage & Quality Gate

on:
  pull_request:
    branches: [ main, rebuild/production-grade ]
  push:
    branches: [ rebuild/production-grade ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Test & Coverage Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run full test suite (Testcontainers + JaCoCo)
        run: mvn clean verify -B
        env:
          TESTCONTAINERS_RYUK_DISABLED: "false"

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/

      - name: SonarCloud Analysis
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=GowthamReddyNagabhusi_web-based-language-translator \
            -Dsonar.organization=gowthamreddynagabhusi \
            -Dsonar.host.url=https://sonarcloud.io \
            -B || echo "SonarCloud skipped (SONAR_TOKEN not configured)"

      - name: Comment PR with coverage summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "## Test Coverage\nJaCoCo report uploaded as CI artifact. Minimum threshold: **80%**."
            });
