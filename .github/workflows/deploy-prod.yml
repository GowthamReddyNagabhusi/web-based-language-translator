name: Deploy to Production

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on version tags like v1.2.3

env:
  AWS_REGION: us-east-1
  ECR_REPO: translator-prod

jobs:
  approve:
    name: Manual Approval Gate
    runs-on: ubuntu-latest
    environment: production   # GitHub Environment with required reviewers configured
    steps:
      - name: Approval gate
        run: echo "Approved — proceeding with production deployment"

  deploy-prod:
    name: Build + Blue-Green Deploy (Prod)
    needs: approve
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run full test suite
        run: mvn clean verify -B

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image (prod)
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.ref_name }}   # version tag e.g. v1.2.3
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPO:stable
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:stable
          echo "image=$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Register new ECS task definition
        id: task-def
        env:
          TASK_FAMILY: translator-prod
          IMAGE: ${{ steps.build-image.outputs.image }}
        run: |
          TASK_DEF=$(aws ecs describe-task-definition --task-definition $TASK_FAMILY --query taskDefinition)
          NEW_TASK_DEF=$(echo $TASK_DEF | \
            jq --arg IMAGE "$IMAGE" \
            '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)')
          NEW_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_def_arn=$NEW_ARN" >> $GITHUB_OUTPUT

      - name: Blue-Green deploy via ECS service update
        env:
          CLUSTER: translator-cluster-prod
          SERVICE: translator-service-prod
          TASK_DEF_ARN: ${{ steps.task-def.outputs.task_def_arn }}
        run: |
          aws ecs update-service \
            --cluster $CLUSTER \
            --service $SERVICE \
            --task-definition $TASK_DEF_ARN

      - name: Wait for ECS service stability
        env:
          CLUSTER: translator-cluster-prod
          SERVICE: translator-service-prod
        run: |
          aws ecs wait services-stable \
            --cluster $CLUSTER \
            --services $SERVICE

      - name: Production smoke test
        run: |
          ALB_URL=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?contains(LoadBalancerName, 'translator-alb-prod')].DNSName" \
            --output text)
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" "http://$ALB_URL/actuator/health")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Smoke test FAILED — HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Smoke test PASSED — HTTP $HTTP_STATUS"

      - name: Auto-rollback on failure
        if: failure()
        env:
          CLUSTER: translator-cluster-prod
          SERVICE: translator-service-prod
          TASK_FAMILY: translator-prod
        run: |
          echo "Rolling back to previous task definition..."
          PREV_ARN=$(aws ecs describe-task-definition \
            --task-definition $TASK_FAMILY \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service \
            --cluster $CLUSTER \
            --service $SERVICE \
            --task-definition $PREV_ARN
          echo "Rollback initiated"

      - name: Create GitHub Release
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `Release ${context.ref.replace('refs/tags/', '')}`,
              body: `Production deployment successful for ${context.sha}`
            });
