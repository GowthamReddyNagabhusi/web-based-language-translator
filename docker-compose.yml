version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: translator-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: translator_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: translator_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U translator_user -d translator_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: translator-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  localstack:
    image: localstack/localstack:3
    container_name: translator-localstack
    ports:
      - "4566:4566"            # LocalStack Gateway
    environment:
      - SERVICES=sqs,s3,secretsmanager,translate
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./volume}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"

volumes:
  postgres_data:
  redis_data:
