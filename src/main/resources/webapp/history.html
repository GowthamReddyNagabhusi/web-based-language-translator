<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Translator — History</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="nav gradient-nav">
    <div class="nav-left">
      <a class="brand" href="index.html">🌐 Translator</a>
      <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="history.html" class="active">History</a>
        <a href="about.html">About</a>
      </nav>
    </div>
    <div class="nav-right">
      <input id="searchInput" placeholder="Search history…" aria-label="Search history" />
      <select id="filterLang" aria-label="Filter by language">
        <option value="">All languages</option>
        <option value="fr">🇫🇷 French</option>
        <option value="es">🇪🇸 Spanish</option>
        <option value="de">🇩🇪 German</option>
        <option value="hi">🇮🇳 Hindi</option>
        <option value="ja">🇯🇵 Japanese</option>
        <option value="zh">🇨🇳 Chinese</option>
        <option value="it">🇮🇹 Italian</option>
        <option value="te">🇮🇳 Telugu</option>
      </select>
      <button id="themeToggle" class="icon-btn" title="Toggle theme" aria-label="Toggle dark mode">🌙</button>
    </div>
  </header>

  <main class="container">
    <div class="history-toolbar">
      <div class="history-stats" id="historyStats">0 translations</div>
      <div class="history-actions">
        <button id="exportBtn" class="btn" title="Export history as JSON">📤 Export</button>
        <label class="btn import-label" title="Import history from JSON">📥 Import
          <input type="file" id="importFile" accept=".json" hidden />
        </label>
        <button id="clearAllBtn" class="btn danger">🗑️ Clear All</button>
      </div>
    </div>
    <section class="history-grid" id="historyGrid">
      <!-- Cards inserted by history.js -->
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span>🌐 Translator v2.0</span>
      <span class="footer-sep">·</span>
      <a href="index.html" class="footer-link">Home</a>
      <span class="footer-sep">·</span>
      <a href="about.html" class="footer-link">About</a>
    </div>
  </footer>

  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
  <script type="module" src="history.js"></script>
</body>
</html>
