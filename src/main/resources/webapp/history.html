<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Linguify — History</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-mesh" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <header class="topbar">
    <div class="topbar-inner">
      <a class="logo" href="index.html">
        <span class="logo-mark">🌐</span>
        <span class="logo-name">Linguify</span>
      </a>
      <nav class="topnav">
        <a href="index.html" class="tnav">Translate</a>
        <a href="history.html" class="tnav active">History</a>
        <a href="about.html" class="tnav">About</a>
      </nav>
      <div class="topbar-right">
        <input id="searchInput" class="hist-search" placeholder="Search history…" aria-label="Search history"/>
        <select id="filterLang" class="lang-select" aria-label="Filter by language">
          <option value="">All</option>
          <option value="fr">🇫🇷 French</option>
          <option value="es">🇪🇸 Spanish</option>
          <option value="de">🇩🇪 German</option>
          <option value="hi">🇮🇳 Hindi</option>
          <option value="ja">🇯🇵 Japanese</option>
          <option value="zh">🇨🇳 Chinese</option>
          <option value="it">🇮🇹 Italian</option>
          <option value="te">🇮🇳 Telugu</option>
        </select>
        <button id="themeToggle" class="theme-btn" aria-label="Toggle dark mode">
          <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="container" style="position:relative;z-index:1;">
    <div class="history-toolbar">
      <div class="history-stats" id="historyStats">0 translations</div>
      <div class="history-actions">
        <button id="exportBtn" class="btn" title="Export history">Export</button>
        <label class="btn import-label" title="Import history">Import
          <input type="file" id="importFile" accept=".json" hidden/>
        </label>
        <button id="clearAllBtn" class="btn danger">Clear All</button>
      </div>
    </div>
    <section class="history-grid" id="historyGrid"></section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-logo">🌐 Linguify</span>
      <span class="sep">·</span>
      <a href="index.html" class="flink">Home</a>
      <span class="sep">·</span>
      <a href="about.html" class="flink">About</a>
    </div>
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script type="module" src="history.js"></script>
</body>
</html>
