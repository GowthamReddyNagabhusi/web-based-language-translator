server.port=8080
translation.max.length=5000

# CORS: comma-separated allowed origins (use * for development only)
cors.allowed.origins=*

# Rate limiting: max requests per minute per IP (0 = disabled)
ratelimit.requests.per.minute=60

# Request body size limit in bytes (64KB default)
request.max.body.bytes=65536

# Upstream translation timeouts (seconds)
translation.connect.timeout=8
translation.request.timeout=10

# Cache settings
cache.max.size=10000
cache.ttl.minutes=60

# Circuit breaker
circuit.breaker.failure.threshold=50
circuit.breaker.wait.seconds=30
